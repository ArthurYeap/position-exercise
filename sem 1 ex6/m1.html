<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid-container{display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,100px); gap: 10px; }
        .grid-item{border: 1px solid black; display: flex; justify-content: center; align-items: center; }
        .item1{ grid-column: span 2;}
        .item2{ grid-row: span 2;}
        
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="grid-item item1" style="background-color: plum;" >1</div>
        <div class="grid-item item2" style="background-color: plum;" >2</div>
        <div class="grid-item item3" style="background-color: plum;" >3</div>
        <div class="grid-item item4" style=" background-color: plum;" >4</div>
        <div class="grid-item item5" style="background-color: plum;" >5</div>
    </div>

</body>
</html>
