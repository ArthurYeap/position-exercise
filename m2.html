<!doctype html>
<html>
    <head>
        <title>Sticky Navigation Exercise</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Caveat:wght@400..700&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet" />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Bungee&family=Caveat:wght@400..700&family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap");
        </style>
        <style>
            header {
                background-color: lightblue;
                width: 100%;
                height: 10vh;
            }
            .sticky-nav {
                position: sticky;
                top: 0;
                background-color: teal;
                width: 100%;
                height: 7vh;
                z-index: 10;
            }
            #section1 {
                background-color: red;
                width: 100%;
                height: 100vh;
            }
            #section2 {
                background-color: purple;
                width: 100%;
                height: 100vh;
            }
            #section3 {
                background-color: blue;
                width: 100%;
                height: 100vh;
            }
            footer {
                background-color: blueviolet;
                width: 100%;
                height: 50vh;
            }
            ul {
                display: flex;
            }
            li {
                display: flex;
                justify-content: center;
                margin-right: 140px;
                margin-left: 165px;
            }
            .link3 {
                background-color: teal;
                color: white;
                padding: 15px 30px;
                /* Add a transition for smoothness */
                transition: background-color 0.3s ease; /* */
                width: 6.5vw;
                font-family: Bungee;
            }
            .link3:hover {
                background-color: #002ead; /* Change background color on hover */
                cursor: pointer; /* Change cursor to a hand pointer */
            }

            * {
                margin: 0;
            }
            section h2,
            p {
                font-family: Iosevka Charon;
                font-size: 3rem;
                text-align: center;
            }
            /* *{  width: 80%;} */
        </style>
    </head>
    <body>
        <header>
            <h1 style="text-align: center; font-family: Caveat; font-size: 4rem">Website Title</h1>
        </header>

        <nav class="sticky-nav">
            <ul>
                <li><a href="#section1" class="link3" style="color: rgb(30, 211, 109)">Section 1</a></li>
                <li><a href="#section2" class="link3" style="color: rgb(30, 211, 109)">Section 2</a></li>
                <li><a href="#section3" class="link3" style="color: rgb(30, 211, 109)">Section 3</a></li>
            </ul>
        </nav>

        <section id="section1" class="content-section">
            <h2>Section 1</h2>
            <p>Content for section 1...</p>
        </section>

        <section id="section2" class="content-section">
            <h2>Section 2</h2>
            <p>Content for section 2...</p>
        </section>

        <section id="section3" class="content-section">
            <h2>Section 3</h2>
            <p>Content for section 3...</p>
        </section>

        <footer>
            <p>Footer content</p>
        </footer>
    </body>
</html>
